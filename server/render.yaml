services:
  - type: web
    name: netcradus-crm-backend
    env: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: node --max-old-space-size=384 index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DRIVE_FEATURE_ENABLED
        value: "false"
      - key: GEOLOCATION_TIMEOUT_MS
        value: "800"
      - key: GEOLOCATION_CACHE_TTL_MS
        value: "86400000"
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: MONGO_MAX_POOL_SIZE
        value: "10"
      - key: MONGO_MIN_POOL_SIZE
        value: "0"
      - key: CRON_AUTO_PUNCH_OUT
        value: "7 * * * *"
      - key: CRON_TASK_DUE_REMINDER
        value: "17 */2 * * *"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"
      - key: ADMIN_SEED_KEY
        sync: false
      - key: ADMIN_SEED_USERNAME
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
