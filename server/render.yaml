services:
  - type: web
    name: netcradus-crm-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_KEY
        sync: false
      - key: ADMIN_SEED_USERNAME
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
